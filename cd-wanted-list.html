<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD Wanted List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2efe8; --surface: #faf8f3; --surface2: #eeebe2;
    --border: #d8d4c8; --border-light: #e8e4da;
    --text: #1c1a15; --text-muted: #7a7668; --text-faint: #b0ada4;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    --gold: #b8941f;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  header { background: var(--text); color: var(--bg); padding: 14px 20px; display: flex; align-items: baseline; gap: 14px; }
  header h1 { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
  header .sub { font-size: 11px; opacity: 0.5; font-family: var(--mono); }
  .tabs { background: var(--surface); border-bottom: 2px solid var(--border); display: flex; padding: 0 16px; }
  .tab { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.05em; padding: 11px 18px; border: none; background: none; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; text-transform: uppercase; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab .count { display: inline-block; font-size: 10px; background: var(--surface2); border-radius: 3px; padding: 1px 5px; margin-left: 6px; color: var(--text-muted); }
  .tab.active .count { background: var(--text); color: var(--bg); }
  .toolbar { padding: 8px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .toolbar input { font-family: var(--mono); font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); width: 200px; }
  .toolbar input:focus { outline: none; border-color: var(--text); }
  .genre-btns { display: flex; gap: 5px; flex-wrap: wrap; }
  .gbtn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 3px; border: 1px solid var(--border); background: none; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
  .gbtn:hover { color: var(--text); background: var(--surface2); }
  .gbtn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .badge { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .got-toggle { font-family: var(--mono); font-size: 11px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; background: none; color: var(--text-muted); cursor: pointer; }
  .got-toggle:hover { background: var(--surface2); color: var(--text); }
  .got-toggle.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .score-legend { display: flex; gap: 10px; align-items: center; font-family: var(--mono); font-size: 10px; color: var(--text-muted); flex-wrap: wrap; padding: 7px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .score-legend span { display: flex; align-items: center; gap: 4px; }
  .tab-content { max-width: 980px; margin: 0 auto; padding: 14px 16px; }
  .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; background: var(--surface2); white-space: nowrap; }
  tbody tr.main-row { cursor: pointer; border-bottom: 1px solid var(--border-light); }
  tbody tr.main-row:hover td { background: var(--bg); }
  tbody tr.main-row.got td { opacity: 0.4; }
  tbody tr.main-row.got .cell-artist { text-decoration: line-through; text-decoration-color: var(--border); }
  tbody tr.genre-row td { background: var(--surface2); padding: 7px 12px 3px; font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); border-top: 1px solid var(--border); border-bottom: none; }
  tbody td { padding: 9px 12px; vertical-align: middle; font-size: 13px; }
  tbody tr.detail-row td { padding: 0; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .detail-inner { display: none; padding: 10px 14px; font-size: 12px; line-height: 1.6; color: var(--text-muted); border-left: 3px solid var(--border); }
  .detail-inner.open { display: block; }
  .cell-expand { width: 20px; text-align: center; }
  .cell-score { width: 46px; text-align: center; }
  .cell-artist { width: 16%; font-weight: 500; }
  .cell-album { width: 20%; font-weight: 600; }
  .cell-label { width: 13%; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .cell-cat { width: 13%; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .cell-price { width: 76px; font-family: var(--mono); font-size: 11px; text-align: right; }
  .cell-tip { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .cell-ap { width: 54px; text-align: center; }
  .cell-got { width: 36px; text-align: center; }
  .score { display: inline-block; font-family: var(--mono); font-size: 12px; font-weight: 600; width: 26px; height: 26px; line-height: 26px; text-align: center; border-radius: 4px; }
  .score-5 { background: #eaf4ec; color: #1a5c2a; border: 1px solid #b0dbb8; }
  .score-4 { background: #f0f7ef; color: #2d7a3a; border: 1px solid #c0ddc4; }
  .score-3 { background: #fdf6e3; color: #8a6200; border: 1px solid #e0c87a; }
  .score-2 { background: #fdf0e8; color: #7a4010; border: 1px solid #d4a07a; }
  .score-1 { background: #f2f2f2; color: #5a5a5a; border: 1px solid #c8c8c8; }
  .gold-tag { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; background: linear-gradient(135deg,#f4d97a,#b8941f); color: #3a2800; margin-left: 4px; vertical-align: middle; }
  .ap-dot { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; white-space: nowrap; }
  .ap-dot:hover { background: #b8941f18; }
  .got-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--text); }
  .chevron { transition: transform 0.15s; display: inline-block; font-size: 9px; color: var(--text-faint); }
  .chevron.open { transform: rotate(90deg); }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-family: var(--mono); font-size: 12px; }
  .box-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; }
  .box-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; cursor: pointer; position: relative; }
  .box-card:hover { background: var(--bg); }
  .box-card.got { opacity: 0.4; }
  .box-artist { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .box-album { font-size: 14px; font-weight: 600; margin: 3px 0 6px; }
  .box-cat { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .box-price { font-family: var(--mono); font-size: 12px; margin-top: 8px; }
  .box-detail { font-size: 11px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; display: none; }
  .box-card.open .box-detail { display: block; }
  .box-got { position: absolute; top: 14px; right: 14px; }
  @media (max-width: 700px) { .cell-cat, .cell-label { display: none; } .toolbar input { width: 140px; } }
</style>
</head>
<body>
<header><h1>CD WANTED LIST</h1><span class="sub">Amoeba hunt</span></header>
<div class="tabs">

    {id:'s31',genre:"Soul/R&B",sortKey:"Gaye",artist:"Marvin Gaye",album:"What's Going On",label:"Motown",cat:"MOTD-5239",priceLow:6,priceHigh:10,spotIt:"Early Motown MOTD-5239 or Harry Weinger remaster 440 016 358-2. Avoid 'Classic Albums' reissue series.",detail:"MFSL UDCD 728 gold at $50-80 if you want to splurge, but early Motown is honest and cheap.",apId:null},

  {id:'s121',genre:"Rock/Pop",sortKey:"Wilco",artist:"Wilco",album:"Yankee Hotel Foxtrot",label:"Nonesuch",cat:"79669-2",priceLow:12,priceHigh:20,spotIt:"2022 remaster. 'Remastered by Bob Ludwig' on spine. Standard 2CD or standalone disc. Avoid original 2002 pressing.",detail:"2022 Bob Ludwig remaster at Gateway Mastering, Portland. Significant improvement over compressed 2002 original — more dynamic, more air around the instruments. The 2-disc edition adds The Unified Theory of Everything bonus disc with alternates from the YHF sessions.",apId:null},
  {id:'s122',genre:"Rock/Pop",sortKey:"Wilco",artist:"Wilco",album:"Summerteeth",label:"Reprise",cat:"47282-2",priceLow:8,priceHigh:15,spotIt:"1999 original Reprise. WEA Olyphant matrix. Mastered at Gateway by Bob Ludwig. Avoid 2003 Cinram repress (CI/CA in matrix).",detail:"1999 original WEA Olyphant pressing, mastered by Bob Ludwig at Gateway Portland. Mixed at Ocean Way. Pre-loudness-war. The original pressing is cleaner and more open than later Cinram represses. Look for 'OLYPHANT' in disc matrix.",apId:null},
  {id:'s123',genre:"Rock/Pop",sortKey:"Wilco",artist:"Wilco",album:"Being There",label:"Reprise",cat:"9 46236-2",priceLow:8,priceHigh:15,spotIt:"1996 original 2CD. WEA Olyphant matrix. Mastered at Gateway by Bob Ludwig. Pre-loudness-war.",detail:"1996 original 2-disc WEA Olyphant pressing, mastered by Bob Ludwig at Gateway Portland. Mixed at CRC and Ocean Way Chicago. Despite being from 1996, dynamic range is excellent — disc comments note it sounds remarkable even at high volume. Look for 'OLYPHANT' in disc matrix.",apId:null},
  {id:'s124',genre:"Rock/Pop",sortKey:"Wilco",artist:"Wilco",album:"AM",label:"Reprise",cat:"45934-2",priceLow:5,priceHigh:12,spotIt:"1995 original Reprise. Pre-loudness-war. WEA manufacture.",detail:"Wilco's 1995 debut. Original Reprise pressing is the one to find. Pre-loudness-war, straightforward production by Brian Paulson and Wilco. Worth grabbing cheap in used bins.",apId:null},
  {id:'s125',genre:"Rock/Pop",sortKey:"My Morning Jacket",artist:"My Morning Jacket",album:"It Still Moves",label:"ATO",cat:"ATO0048 / 82876 52979-2",priceLow:8,priceHigh:16,spotIt:"2003 ATO Records. IFPI L136 mastering SID. Reverb-heavy recording from Above the Cadillac Studios, Shelbyville KY. Avoid 2016 remaster (different track listing).",detail:"Recorded at Above the Cadillac Studios by Jim James, horns at Willie Mitchell's Royal Studios, mixed at Capitol Studio C. Original 2003 ATO pressing is the reference. A 2016 deluxe reissue exists remixed by Kevin Ratterman and remastered by Ludwig — worth having if you want the extras, but the original mix is the classic version.",apId:null},
  {id:'s126',genre:"Rock/Pop",sortKey:"My Morning Jacket",artist:"My Morning Jacket",album:"Z",label:"ATO",cat:"ATO0049 / 82876 71694-2",priceLow:8,priceHigh:15,spotIt:"2005 ATO Records. Avoid content-protected versions (82876 71067-2). Look for standard jewel case.",detail:"Recorded at Allaire Studios and Woodland Sound, Atlanta. More focused and studio-crafted than It Still Moves — the band's production leap. Original ATO pressing is the reference. Avoid copy-protected versions.",apId:null},
  {id:'s127',genre:"Rock/Pop",sortKey:"Fountains of Wayne",artist:"Fountains of Wayne",album:"Fountains of Wayne",label:"Atlantic / TAG",cat:"A2 92725",priceLow:5,priceHigh:12,spotIt:"1996 original. TAG/Atlantic label. 'A2 92725' on disc. Mastered by Greg Calbi at Masterdisk NYC. No remaster sticker.",detail:"Debut album recorded Jan–Apr 1996 at The Place NYC, mixed at Greene Street Recording. Mastered by Greg Calbi at Masterdisk — pre-loudness-war, clean and punchy. Original US or early European pressings are the ones to find.",apId:null},
  {id:'s128',genre:"Rock/Pop",sortKey:"Fountains of Wayne",artist:"Fountains of Wayne",album:"Utopia Parkway",label:"Atlantic",cat:"83177-2",priceLow:5,priceHigh:12,spotIt:"1999 original Atlantic. WEA Olyphant matrix (X7157). Mastered at Sony Studios NYC by Vladimir Meller. No remaster sticker.",detail:"Recorded at Stratosphere Sound and The Big House NYC, mixed at Q Division Boston. WEA Olyphant pressing, mastered at Sony Studios NYC. Pre-loudness-war. The better early pressing to look for has 'wea mfg. OLYPHANT X7157' in matrix.",apId:null},
  {id:'s129',genre:"Rock/Pop",sortKey:"LaMontagne",artist:"Ray LaMontagne",album:"Trouble",label:"RCA / BMG",cat:"82876 63459-2",priceLow:6,priceHigh:14,spotIt:"2004 RCA/BMG digipak. Produced and recorded by Ethan Johns at Sunset Sound Hollywood. No remaster sticker.",detail:"Debut album produced and recorded by Ethan Johns at Sunset Sound Recorders, Hollywood. Same production chain as Gossip in the Grain — Ethan Johns handling all instruments, engineering and mixing. Compact and intimate. Same pedigree as your Gossip pressing.",apId:null},
  {id:'s130',genre:"Rock/Pop",sortKey:"LaMontagne",artist:"Ray LaMontagne",album:"Till the Sun Turns Black",label:"RCA",cat:"82876 83328-2",priceLow:5,priceHigh:12,spotIt:"2006 RCA digipak. Produced by Ethan Johns at Allaire Studios Shokan NY. Mastered by Ted Jensen at Sterling Sound NYC. No remaster sticker.",detail:"Second album, produced by Ethan Johns at Allaire Studios in the Catskills. Mastered by Ted Jensen at Sterling Sound — a strong mastering chain. Discogs reviewer: 'One of the better sounding CDs I own that isn't specifically an audiophile release.' Same Ethan Johns production pedigree as Gossip in the Grain.",apId:null},
  {id:'s131',genre:"Rock/Pop",sortKey:"Junip",artist:"Junip",album:"Fields",label:"City Slang",cat:"SLANG0680006",priceLow:6,priceHigh:14,spotIt:"2010 City Slang. SLANG747888 or SLANG0680006. Recorded and produced at Stampen studio, mixed at Don Pierre Studio, mastered at Svenska Grammofon Studion Stockholm.",detail:"Debut full-length from José González's trio. Recorded and mastered entirely in Sweden on an indie budget. Mastered by Don Alstherberg and Hans Olsson at Svenska Grammofon Studion — a boutique facility with a good reputation for acoustic music. Warm and dynamic for the genre. Worth grabbing cheap.",apId:null},
  {id:'s132',genre:"Rock/Pop",sortKey:"Simpson",artist:"Sturgill Simpson",album:"High Top Mountain",label:"High Top Mountain Records",cat:"HTM-478704",priceLow:6,priceHigh:14,spotIt:"2013 original. High Top Mountain Records digisleeve. Produced by Dave Cobb. Mastered by Richard Dodd. Engineered by Vance Powell at Sputnik Sound Nashville.",detail:"Self-funded debut produced by Dave Cobb, engineered by Vance Powell at Sputnik Sound, mastered by Richard Dodd. The same production chain (Cobb/Powell) as Metamodern Sounds. Recorded at Falling Rock and Hillbilly Central in Nashville. Dynamic, punchy, no loudness war issues. A strong complement to your Metamodern copy.",apId:null},
  {id:'s133',genre:"Rock/Pop",sortKey:"Musgraves",artist:"Kacey Musgraves",album:"Same Trailer Different Park",label:"Mercury Nashville",cat:"B0018029-02",priceLow:5,priceHigh:12,spotIt:"2013 Mercury Nashville. Jewel case. Mastered at Georgetown Masters Nashville by Andrew Mendelson. No remaster sticker.",detail:"Debut album recorded at Ben's Studio Nashville, mixed at The Racket and Maverick Recording, mastered at Georgetown Masters by Andrew Mendelson. Pre-loudness-war era Nashville production. Note: mastering is considered adequate but not exceptional — grab it if cheap but not worth hunting specifically.",apId:null},
  {id:'s134',genre:"Rock/Pop",sortKey:"Big Thief",artist:"Big Thief",album:"Capacity",label:"Saddle Creek",cat:"SC-263",priceLow:8,priceHigh:16,spotIt:"2017 Saddle Creek. Produced by Andrew Sarlo. Recorded at Outlier Inn Recording, Woodridge NY and Brooklyn studios.",detail:"Recorded in a farmhouse the band was house-sitting, produced by Andrew Sarlo. Saddle Creek indie release — no major label loudness war pressure. Intimate, guitar-forward recording. Worth grabbing if you find it cheap.",apId:null},
  {id:'s135',genre:"Rock/Pop",sortKey:"Big Thief",artist:"Big Thief",album:"U.F.O.F.",label:"4AD",cat:"4AD0129CD",priceLow:8,priceHigh:16,spotIt:"2019 4AD. Produced by Andrew Sarlo. Recorded at Bear Creek Studio, Woodinville WA by Dom Monks.",detail:"Recorded at Bear Creek Studio in rural western Washington by engineer Dom Monks — a studio with a strong reputation for natural acoustic recording. Produced by Andrew Sarlo. 4AD indie mastering chain, no loudness war issues. The more ethereal of the two 2019 Big Thief releases.",apId:null},
  // ── U2 STANDARD PRESSINGS ──
  {id:'s136',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"Boy",label:"Island",cat:"ILPS 9646 / W.Germany target",priceLow:8,priceHigh:20,spotIt:"West German PolyGram target pressing — purple/green target design. 'Made in West Germany by PolyGram' on disc. Mastered at The Sound Clinic. Avoid 2008 Universal remaster (compressed, louder).",detail:"The West German PolyGram target pressing is the consensus best standard CD version — same Hannover plant, flat analog transfer. Produced by Steve Lillywhite at Windmill Lane Dublin. Early Irish post-punk at its most raw. Avoid all 2008 Island/Universal remasters.",apId:null},
  {id:'s137',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"October",label:"Island",cat:"ILPS 9680 / W.Germany target",priceLow:8,priceHigh:20,spotIt:"West German PolyGram target pressing. 'Made in West Germany by PolyGram' on disc. Avoid 2008 Universal remaster.",detail:"West German PolyGram target is the best standard version. Produced by Steve Lillywhite at Windmill Lane Dublin. The weakest U2 album but the early W.Germany pressing is still the right one to find. Avoid 2008 remasters.",apId:null},
  {id:'s138',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"War",label:"Island",cat:"90067-2 / W.Germany target",priceLow:8,priceHigh:20,spotIt:"West German PolyGram target pressing — purple/green target design, outer mirror band on earliest versions. 'Made in West Germany by PolyGram' on disc. No barcode on earliest. Avoid 2008 Universal remaster.",detail:"The West German PolyGram target is the clear winner — Discogs comments note 'sounds really fucking great, no compression, this is how all CDs should sound.' Produced by Steve Lillywhite at Windmill Lane. The band's commercial breakthrough. Earliest version has no barcode and outer mirror band — prefer that over later barcoded version.",apId:null},
  {id:'s139',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"The Unforgettable Fire",label:"Island",cat:"90231-2 / W.Germany target",priceLow:8,priceHigh:18,spotIt:"West German PolyGram target or early Island pressing. 'Made in West Germany by PolyGram' on disc. Avoid 2009 Universal 25th anniversary remaster.",detail:"First collaboration with Brian Eno and Daniel Lanois at Slane Castle — the sonic leap from the Lillywhite era. West German PolyGram target pressing preferred. Avoid the 2009 25th anniversary remaster which applied compression. Original is open and atmospheric.",apId:null},
  {id:'s140',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"The Joshua Tree",label:"Island",cat:"90581-2",priceLow:6,priceHigh:15,spotIt:"Original 1987 Island pressing. 'Island Records' label, no 'remastered' text. Avoid 2007 20th anniversary and 2017 30th anniversary remasters — both more compressed than original.",detail:"First U2 album released simultaneously on CD, cassette and LP — the original Island CD is dynamic and well-mastered. Produced by Brian Eno and Daniel Lanois. The 2007 remaster was better received than the 2008 early-album remasters but the original is still the preferred version. Early Island pressing with no remaster text is the one to find.",apId:null},
  {id:'s141',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"Rattle and Hum",label:"Island",cat:"91003-2",priceLow:5,priceHigh:12,spotIt:"Original 1988 Island pressing. 'Island Records' label. No remaster text — Rattle and Hum has NEVER had an official physical remaster release due to Paramount rights issues. Any copy is effectively the original master.",detail:"The only U2 album from this era never officially remastered on CD — Paramount film rights have blocked it. Original Island 91003-2 is the only version that exists in standard format. Live and studio hybrid. Any copy you find is using the original master.",apId:null},
  {id:'s142',genre:"Rock/Pop",sortKey:"U2",artist:"U2",album:"Achtung Baby",label:"Island",cat:"510 347-2",priceLow:6,priceHigh:15,spotIt:"Original 1991 Island pressing. 'Island Records' label. No '20th Anniversary' or remaster text. Avoid 2011 20th anniversary remaster and 2018/2021 remasters — all more compressed.",detail:"Recorded in Berlin and Dublin with Eno/Lanois — the band's creative reinvention. Original 1991 Island pressing is the preferred version. The 2011 20th anniversary remaster applied compression; original is more dynamic and open. Produced by Daniel Lanois and Brian Eno, engineered by Flood.",apId:null},
  // ── ALICE COLTRANE ──
  {id:'s143',genre:"Jazz",sortKey:"Coltrane A",artist:"Alice Coltrane",album:"Journey in Satchidananda",label:"Impulse!",cat:"IMPD-228",priceLow:10,priceHigh:18,spotIt:"1997 Impulse! remaster (IMPD-228). Best standard CD version. Tri-fold digipak. Avoid later GEO and URP represses.",detail:"Recorded November 1970 at the Coltrane home studio, Dix Hills NY. Pharoah Sanders, Cecil McBee, Rashied Ali, Charlie Haden. The 1997 MCA/Impulse remaster (IMPD-228) is the best standard CD — audiophile-quality remastering, tri-fold digipak with original liner notes. Avoid the later GEO-stamped represses (more common, slightly inferior). Superior format: Verve Acoustic Sounds 180g LP (2023, from original analog tapes, QRP pressing) — the vinyl reference.",apId:null},
  {id:'s144',genre:"Jazz",sortKey:"Coltrane A",artist:"Alice Coltrane",album:"Ptah, the El Daoud",label:"Impulse!",cat:"IMPD-174",priceLow:10,priceHigh:18,spotIt:"1994 MCA/Impulse remaster (IMPD-174). Best standard CD. Avoid budget grey-label reissues.",detail:"Recorded January 1970 at the Coltrane home studio, Dix Hills NY. Joe Henderson and Pharoah Sanders both on tenor and alto flute — their only album together. Ron Carter on bass, Ben Riley on drums. More accessible than Journey in Satchidananda. Early MCA/Impulse CD remaster is the reference — avoid the grey-label budget reissues which London Jazz Collector notes are muddy and boomy vs the original. Superior format: Verve By Request 180g LP (2022, Third Man Pressing, Detroit).",apId:null},
  {id:'s145',genre:"Jazz",sortKey:"Coltrane A",artist:"Alice Coltrane",album:"A Monastic Trio",label:"Impulse!",cat:"IMPD-168",priceLow:10,priceHigh:20,spotIt:"1994 MCA/Impulse remaster. Best standard CD. Her debut — more scarce than later titles.",detail:"Her debut, recorded January and June 1968 at the Coltrane home studio, Dix Hills NY. More rooted in post-bop than the later Impulse records — Ron Carter on bass, Rashied Ali on drums, Pharoah Sanders on bass clarinet on one track. Quieter and more chamber-like than Journey in Satchidananda. The 1994 MCA/Impulse CD remaster is the reference. Harder to find than the later albums.",apId:null},
  // ── DONNIE HATHAWAY ──
  {id:'s146',genre:"Soul/R&B",sortKey:"Hathaway",artist:"Donny Hathaway",album:"Live",label:"Atlantic",cat:"SD 7911-2",priceLow:6,priceHigh:14,spotIt:"Original Atlantic CD. 'Atlantic' label, SD 7911-2. No remaster text. Recorded 1971 at The Troubadour Hollywood and The Bitter End NYC.",detail:"Recorded August and October 1971 — Troubadour Hollywood (side one, produced by Arif Mardin) and Bitter End NYC (side two, produced by Wexler and Mardin). Willie Weeks on bass, Cornell Dupree on guitar. One of the great live soul recordings. The plain Atlantic CD is described as excellent — warm, open, captures the intimate club atmosphere. Rhino reissue also considered strong. Superior format: original Atlantic vinyl (PR Presswell pressing is the reference).",apId:null},
  // ── RICHIE HAVENS ──
  {id:'s147',genre:"Rock/Pop",sortKey:"Havens",artist:"Richie Havens",album:"Mixed Bag",label:"Verve Forecast",cat:"835 210-2",priceLow:6,priceHigh:14,spotIt:"Verve/PolyGram CD (835 210-2). His definitive studio album. Open-E guitar tuning, thumb-chorded strumming. Here Comes the Sun, Just Like a Woman, Eleanor Rigby, Handsome Johnny.",detail:"Recorded July and September 1966. Produced by John Court. Havens' definitive studio document — his unusual open-E tuning and thumb-strummed acoustic are perfectly captured. Includes Here Comes the Sun, Just Like a Woman, Eleanor Rigby, Handsome Johnny. The Verve/PolyGram CD (835 210-2) is the best available standard version. No audiophile CD treatment exists. Note: a 2004 double CD Flyin' Bird: The Verve Forecast Years combines Mixed Bag with Something Else Again — good value if you want both.",apId:null},
  {id:'s148',genre:"Rock/Pop",sortKey:"Havens",artist:"Richie Havens",album:"Woodstock (Various)",label:"Cotillion / Atlantic",cat:"SD 3-500 / 82306-2",priceLow:8,priceHigh:18,spotIt:"Cotillion/Atlantic 3-CD Woodstock soundtrack. 'Cotillion' or 'Atlantic' label. Havens opens the festival — Freedom (improvised), Handsome Johnny, Here Comes the Sun. No standalone Havens Woodstock CD exists.",detail:"Havens' Woodstock performance is only available as part of the festival compilations — there is no standalone CD of his set. The Cotillion/Atlantic 3-CD set (SD 3-500 original, later Atlantic 82306-2) is the essential document. Havens opened the festival and improvised Freedom on the spot when he ran out of songs — one of the great live moments in rock history. The Atlantic CD reissue is the practical version to find.",apId:null},
];

  {id:'b10',genre:"Classical",sortKey:"Gould",artist:"Glenn Gould",album:"The Complete Unreleased Recording Sessions June 1955",pressing:"Sony Classical 7-CD box + 180g LP + coffee table book.",cat:"88875105432",priceLow:80,priceHigh:130,detail:"Studio conversations throughout. Remarkable document of the 1955 Goldberg sessions."},
];

let gotState={}, hideGot={audiophile:false,standard:false,boxsets:false};
let activeGenre={audiophile:'All',standard:'All',boxsets:'All'};
let openRows=new Set(), openBoxes=new Set();

function loadState(){try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');gotState=d.got||{};}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({got:gotState}));}catch(e){}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function priceStr(lo,hi){return lo===hi?`$${lo}`:`$${lo}-${hi}`;}

function switchTab(tab){
  ['audiophile','standard','boxsets'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display=t===tab?'':'none';
    document.querySelector(`.tab[data-tab="${t}"]`).classList.toggle('active',t===tab);
  });
}

function toggleHideGot(tab){
  hideGot[tab]=!hideGot[tab];
  document.getElementById(`hide-got-${tab}`).classList.toggle('active',hideGot[tab]);
  rerender(tab);
}

function setGenre(tab,genre){
  activeGenre[tab]=genre;
  document.querySelectorAll(`#genre-btns-${tab} .gbtn`).forEach(b=>b.classList.toggle('active',b.dataset.g===genre));
  rerender(tab);
}

function rerender(tab){
  if(tab==='audiophile')renderAudiophile();
  else if(tab==='standard')renderStandard();
  else renderBoxsets();
}

function buildGenreBtns(tab,data){
  const present=[...new Set(data.map(e=>e.genre))];
  const genres=['All',...GENRE_ORDER.filter(g=>present.includes(g))];
  document.getElementById(`genre-btns-${tab}`).innerHTML=genres.map(g=>
    `<button class="gbtn${activeGenre[tab]===g?' active':''}" data-g="${g}" onclick="setGenre('${tab}','${g}')">${g}</button>`
  ).join('');
}

function toggleGot(id,e){
  e.stopPropagation();
  if(gotState[id])delete gotState[id];else gotState[id]=true;
  saveState();
  renderAudiophile();renderStandard();renderBoxsets();
}

function toggleRow(id){
  if(openRows.has(id))openRows.delete(id);else openRows.add(id);
  const d=document.getElementById(`detail-${id}`);
  const ch=document.getElementById(`chev-${id}`);
  if(d)d.classList.toggle('open',openRows.has(id));
  if(ch)ch.classList.toggle('open',openRows.has(id));
}

function toggleBox(id){
  if(openBoxes.has(id))openBoxes.delete(id);else openBoxes.add(id);
  const el=document.getElementById(`box-${id}`);
  if(el)el.classList.toggle('open',openBoxes.has(id));
}

function jumpToAP(apId){
  switchTab('audiophile');
  setTimeout(()=>{
    const el=document.getElementById(`row-${apId}`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--gold)';setTimeout(()=>el.style.outline='',1500);}
    openRows.add(apId);
    const d=document.getElementById(`detail-${apId}`);
    const ch=document.getElementById(`chev-${apId}`);
    if(d)d.classList.add('open');
    if(ch)ch.classList.add('open');
  },80);
}

function sortedData(data){
  return [...data].sort((a,b)=>{
    const gi=GENRE_ORDER.indexOf(a.genre),gj=GENRE_ORDER.indexOf(b.genre);
    if(gi!==gj)return gi-gj;
    const sk=(a.sortKey||'').toLowerCase().localeCompare((b.sortKey||'').toLowerCase());
    if(sk!==0)return sk;
    return(a.album||'').toLowerCase().localeCompare((b.album||'').toLowerCase());
  });
}

function tableRows(rows,isAP){
  if(!rows.length)return `<tr><td colspan="9"><div class="empty">No matches.</div></td></tr>`;
  const sorted=sortedData(rows);
  let html='',lastGenre=null;
  for(const e of sorted){
    const got=!!gotState[e.id],open=openRows.has(e.id);
    if(e.genre!==lastGenre){
      html+=`<tr class="genre-row"><td colspan="9">${esc(e.genre)}</td></tr>`;
      lastGenre=e.genre;
    }
    if(isAP){
      html+=`
      <tr class="main-row ${got?'got':''}" id="row-${e.id}" onclick="toggleRow('${e.id}')">
        <td class="cell-expand"><span class="chevron ${open?'open':''}" id="chev-${e.id}">&#9658;</span></td>
        <td class="cell-score"><span class="score score-${e.score}">${e.score}</span></td>
        <td class="cell-artist">${esc(e.artist)}</td>
        <td class="cell-album">${esc(e.album)}${e.gold?'<span class="gold-tag">GOLD</span>':''}</td>
        <td class="cell-label">${esc(e.label)}</td>
        <td class="cell-cat">${esc(e.cat)}</td>
        <td class="cell-price">${priceStr(e.priceLow,e.priceHigh)}</td>
        <td class="cell-tip">${esc(e.spotIt)}</td>
        <td class="cell-got" onclick="event.stopPropagation()"><input type="checkbox" class="got-check" ${got?'checked':''} onchange="toggleGot('${e.id}',event)"></td>
      </tr>
      <tr class="detail-row"><td colspan="9"><div class="detail-inner ${open?'open':''}" id="detail-${e.id}">${esc(e.detail)}</div></td></tr>`;
    } else {
      const apBtn=e.apId
        ?`<span class="ap-dot" onclick="event.stopPropagation();jumpToAP('${e.apId}')">AP &#8599;</span>`
        :`<span style="color:var(--text-faint);font-size:11px;font-family:var(--mono)">-</span>`;
      html+=`
      <tr class="main-row ${got?'got':''}" id="row-${e.id}" onclick="toggleRow('${e.id}')">
        <td class="cell-expand"><span class="chevron ${open?'open':''}" id="chev-${e.id}">&#9658;</span></td>
        <td class="cell-artist">${esc(e.artist)}</td>
        <td class="cell-album">${esc(e.album)}</td>
        <td class="cell-label">${esc(e.label)}</td>
        <td class="cell-cat">${esc(e.cat)}</td>
        <td class="cell-price">${priceStr(e.priceLow,e.priceHigh)}</td>
        <td class="cell-tip">${esc(e.spotIt)}</td>
        <td class="cell-ap" onclick="event.stopPropagation()">${apBtn}</td>
        <td class="cell-got" onclick="event.stopPropagation()"><input type="checkbox" class="got-check" ${got?'checked':''} onchange="toggleGot('${e.id}',event)"></td>
      </tr>
      <tr class="detail-row"><td colspan="9"><div class="detail-inner ${open?'open':''}" id="detail-${e.id}">${esc(e.detail)}</div></td></tr>`;
    }
  }
  return html;
}

function renderAudiophile(){
  const q=(document.getElementById('search-audiophile').value||'').toLowerCase();
  const g=activeGenre.audiophile;
  const rows=AUDIOPHILE.filter(e=>{
    if(hideGot.audiophile&&gotState[e.id])return false;
    if(g!=='All'&&e.genre!==g)return false;
    if(!q)return true;
    return[e.artist,e.album,e.label,e.cat,e.spotIt,e.detail].some(v=>(v||'').toLowerCase().includes(q));
  });
  document.getElementById('count-audiophile').textContent=AUDIOPHILE.filter(e=>!gotState[e.id]).length+' rem';
  document.getElementById('badge-audiophile').textContent=`${rows.length} shown`;
  buildGenreBtns('audiophile',AUDIOPHILE);
  document.getElementById('tbody-audiophile').innerHTML=tableRows(rows,true);
}

function renderStandard(){
  const q=(document.getElementById('search-standard').value||'').toLowerCase();
  const g=activeGenre.standard;
  const rows=STANDARD.filter(e=>{
    if(hideGot.standard&&gotState[e.id])return false;
    if(g!=='All'&&e.genre!==g)return false;
    if(!q)return true;
    return[e.artist,e.album,e.label,e.cat,e.spotIt,e.detail].some(v=>(v||'').toLowerCase().includes(q));
  });
  document.getElementById('count-standard').textContent=STANDARD.filter(e=>!gotState[e.id]).length+' rem';
  document.getElementById('badge-standard').textContent=`${rows.length} shown`;
  buildGenreBtns('standard',STANDARD);
  document.getElementById('tbody-standard').innerHTML=tableRows(rows,false);
}

function renderBoxsets(){
  const q=(document.getElementById('search-boxsets').value||'').toLowerCase();
  const g=activeGenre.boxsets;
  const items=BOXSETS.filter(e=>{
    if(hideGot.boxsets&&gotState[e.id])return false;
    if(g!=='All'&&e.genre!==g)return false;
    if(!q)return true;
    return[e.artist,e.album,e.pressing,e.cat].some(v=>(v||'').toLowerCase().includes(q));
  });
  document.getElementById('count-boxsets').textContent=BOXSETS.filter(e=>!gotState[e.id]).length+' rem';
  document.getElementById('badge-boxsets').textContent=`${items.length} shown`;
  buildGenreBtns('boxsets',BOXSETS);
  const sorted=sortedData(items);
  const grid=document.getElementById('box-grid');
  if(!sorted.length){grid.innerHTML=`<div class="empty">No matches.</div>`;return;}
  grid.innerHTML=sorted.map(e=>{
    const got=!!gotState[e.id],open=openBoxes.has(e.id);
    return`<div class="box-card ${got?'got':''} ${open?'open':''}" id="box-${e.id}" onclick="toggleBox('${e.id}')">
      <input type="checkbox" class="got-check box-got" ${got?'checked':''} onclick="event.stopPropagation()" onchange="toggleGot('${e.id}',event)">
      <div class="box-artist">${esc(e.genre)} &middot; ${esc(e.artist)}</div>
      <div class="box-album">${esc(e.album)}</div>
      <div class="box-cat">${esc(e.cat)}</div>
      <div class="box-price">${priceStr(e.priceLow,e.priceHigh)}</div>
      <div class="box-detail">${esc(e.pressing)}<br><br>${esc(e.detail)}</div>
    </div>`;
  }).join('');
}

loadState();
renderAudiophile();
renderStandard();
renderBoxsets();
</script>
</body>
</html>
